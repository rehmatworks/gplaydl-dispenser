services:
  postgres:
    image: postgres:18-alpine
    container_name: gplaydl-dispenser-db
    environment:
      POSTGRES_USER: dispenser
      POSTGRES_PASSWORD: dispenser
      POSTGRES_DB: dispenser
    ports:
      - "5466:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dispenser"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
